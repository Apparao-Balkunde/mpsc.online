name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Executing remote ssh commands using SSH Key
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}      
          username: ${{ secrets.USERNAME }} 
          key: ${{ secrets.SSH_KEY }}     
          script: |
            cd /home/ubuntu/mpsc.online
            
            # १. सर्व्हरवरील जुने बदल काढून नवीन कोड ओढणे
            git fetch origin main
            git reset --hard origin/main
            
            # २. डॉकर कंटेनर पूर्णपणे रिफ्रेश करणे
            # आपण इथे GitHub Secrets मधून Supabase चे डिटेल्स पास करत आहोत
            docker compose down
            
            docker compose up -d --build --remove-orphans \
              --build-arg VITE_SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}" \
              --build-arg VITE_SUPABASE_ANON_KEY="${{ secrets.VITE_SUPABASE_ANON_KEY }}"

            # ३. न वापरलेले जुने इमेजेस काढून जागा मोकळी करणे (Oracle Free Tier साठी महत्त्वाचे)
            docker image prune -f
