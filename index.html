    <!-- ✅ Init Script -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister())).catch(() => {});
      }
      if ('caches' in window) {
        caches.keys().then(keys => keys.filter(k => k.includes('mpsc')).forEach(k => caches.delete(k))).catch(() => {});
      }
      try {
        const m = localStorage.getItem('mpsc_mode');
        if (m === 'Quiz' || m === 'QUIZ') localStorage.setItem('mpsc_mode', 'HOME');
      } catch (_) {}
    </script>

    <style>
      *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        font-family: 'Baloo 2', 'Noto Sans Devanagari', sans-serif;
        background: #F5F0E8;
        color: #1a1a1a;
        -webkit-font-smoothing: antialiased;
      }

      /* ═══════════════════════════════════════
         ✨ PREMIUM LOADING SCREEN
         Saffron + Deep Teal — Maharashtra colors
      ═══════════════════════════════════════ */
      #root-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100svh;
        background: linear-gradient(160deg, #0D1F1F 0%, #162929 50%, #1C3535 100%);
        position: relative;
        overflow: hidden;
      }

      /* Background geometric pattern */
      #root-loading::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(circle at 20% 20%, rgba(232,103,26,0.12) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(13,107,110,0.15) 0%, transparent 50%),
          radial-gradient(circle at 60% 20%, rgba(249,115,22,0.06) 0%, transparent 40%);
        pointer-events: none;
      }

      /* Floating dots pattern */
      #root-loading::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle, rgba(232,103,26,0.15) 1px, transparent 1px);
        background-size: 32px 32px;
        pointer-events: none;
        opacity: 0.4;
      }

      /* Logo container */
      .mpsc-logo-wrap {
        position: relative;
        margin-bottom: 32px;
        z-index: 1;
      }

      /* Pulse ring behind logo */
      .mpsc-logo-wrap::before {
        content: '';
        position: absolute;
        inset: -16px;
        border-radius: 50%;
        border: 2px solid rgba(232,103,26,0.2);
        animation: ring-pulse 2s ease-in-out infinite;
      }
      .mpsc-logo-wrap::after {
        content: '';
        position: absolute;
        inset: -32px;
        border-radius: 50%;
        border: 1px solid rgba(232,103,26,0.1);
        animation: ring-pulse 2s ease-in-out infinite 0.5s;
      }

      .mpsc-logo-svg {
        width: 88px;
        height: 88px;
        animation: logo-enter 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
      }

      /* Brand name */
      .mpsc-brand {
        font-family: 'Baloo 2', sans-serif;
        font-weight: 900;
        font-size: 28px;
        color: #fff;
        letter-spacing: -0.03em;
        margin: 0 0 4px;
        z-index: 1;
        animation: fade-up 0.5s ease 0.3s both;
      }
      .mpsc-brand span {
        color: #E8671A;
      }

      .mpsc-tagline {
        font-size: 12px;
        font-weight: 600;
        color: rgba(255,255,255,0.45);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin: 0 0 36px;
        z-index: 1;
        animation: fade-up 0.5s ease 0.4s both;
      }

      /* Loading bar */
      .mpsc-loader-bar {
        width: 160px;
        height: 3px;
        background: rgba(255,255,255,0.08);
        border-radius: 99px;
        overflow: hidden;
        z-index: 1;
        animation: fade-up 0.4s ease 0.5s both;
      }
      .mpsc-loader-fill {
        height: 100%;
        background: linear-gradient(90deg, #E8671A, #F59E0B, #E8671A);
        background-size: 200% 100%;
        border-radius: 99px;
        animation: bar-shimmer 1.5s ease-in-out infinite, bar-grow 2s ease forwards;
      }

      /* Loading steps text */
      .mpsc-load-step {
        margin-top: 16px;
        font-size: 11px;
        font-weight: 700;
        color: rgba(255,255,255,0.3);
        letter-spacing: 0.08em;
        z-index: 1;
        animation: fade-up 0.4s ease 0.6s both;
      }

      /* Keyframes */
      @keyframes logo-enter {
        from { opacity: 0; transform: scale(0.7) rotate(-10deg); }
        to   { opacity: 1; transform: scale(1) rotate(0deg); }
      }
      @keyframes fade-up {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes ring-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50%       { transform: scale(1.1); opacity: 0.4; }
      }
      @keyframes bar-shimmer {
        0%   { background-position: 200% center; }
        100% { background-position: -200% center; }
      }
      @keyframes bar-grow {
        from { width: 0%; }
        to   { width: 100%; }
      }
      @keyframes fade-out {
        to { opacity: 0; transform: scale(1.03); pointer-events: none; }
      }

      .mpsc-loading-hide {
        animation: fade-out 0.4s ease forwards !important;
      }

      /* Top progress bar */
      .mpsc-progress {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, #E8671A, #F59E0B);
        z-index: 9999;
        transform-origin: left;
        animation: bar-grow 2.5s ease forwards;
        box-shadow: 0 0 8px rgba(232,103,26,0.5);
      }

      #seo-content { position: absolute; visibility: hidden; width: 1px; height: 1px; }
    </style>
  </head>

  <body>
    <div class="mpsc-progress" id="top-progress"></div>

    <div id="root">
      <div id="root-loading">

        <!-- SVG Logo — Maharashtra Saffron shield -->

                <stop offset="100%" stop-color="#C4510E"/>

                <stop offset="60%" stop-color="rgba(255,255,255,0)"/>

            </defs>
            <!-- Shield shape -->
            <path d="M44 6 L76 20 L76 48 C76 64 62 76 44 82 C26 76 12 64 12 48 L12 20 Z"
              fill="url(#shield-bg)" />
            <!-- Shine overlay -->

            <!-- MPSC text -->

            <!-- Sarathi text -->
            <text x="44" y="56" text-anchor="middle" font-family="'Noto Sans Devanagari', sans-serif"
              font-weight="700" font-size="10" fill="rgba(255,255,255,0.85)">सारथी</text>
            <!-- Star accents -->
            <circle cx="44" cy="27" r="2" fill="rgba(255,255,255,0.6)"/>
            <circle cx="32" cy="31" r="1.2" fill="rgba(255,255,255,0.3)"/>
            <circle cx="56" cy="31" r="1.2" fill="rgba(255,255,255,0.3)"/>
          </svg>
        </div>

        <h1 class="mpsc-brand">MPSC <span>सारथी</span></h1>
        <p class="mpsc-tagline">Maharashtra's #1 Study Portal</p>

        <div class="mpsc-loader-bar">
          <div class="mpsc-loader-fill"></div>
        </div>
        <p class="mpsc-load-step" id="load-step-text">Initializing...</p>
      </div>
    </div>

    <div id="seo-content" aria-hidden="true">
      <h1>MPSC सारथी - मोफत सराव पोर्टल 2026</h1>
      <p>राज्यसेवा (Rajyaseva), Combined, PSI, STI, ASO आणि सर्व सरळसेवा परीक्षांसाठी महाराष्ट्रातील सर्वोत्तम मोफत मॉक टेस्ट प्लॅटफॉर्म.</p>
    </div>

    <script>
      // Loading step messages
      const steps = ['Initializing...', 'Loading questions...', 'Setting up AI...', 'Almost ready...'];
      let si = 0;
      const stepEl = document.getElementById('load-step-text');
      const stepTimer = setInterval(() => {
        si = (si + 1) % steps.length;
        if (stepEl) stepEl.textContent = steps[si];
      }, 600);

      window.addEventListener('load', function () {
        clearInterval(stepTimer);
        const bar = document.getElementById('top-progress');
        if (bar) { bar.style.opacity = '0'; setTimeout(() => bar.remove(), 400); }
        // Smooth fade out loading screen
        setTimeout(() => {
          const loader = document.getElementById('root-loading');
          if (loader) {
            loader.classList.add('mpsc-loading-hide');
            setTimeout(() => { loader.style.display = 'none'; }, 420);
          }
        }, 800);
      });
    </script>
    <script type="module" src="./index.tsx"></script>
  </body>
